<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZenTask Pro | Enterprise Edition</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="background-blob"></div>

    <div class="app-container">
        <header>
            <div class="header-top">
                <h1>ZenTask<span>Pro</span></h1>
                <button id="theme-toggle" class="theme-btn">🌙</button>
            </div>
            <p id="date-display"></p>
        </header>

        <section class="input-section">
            <div class="input-wrapper">
                <input type="text" id="task-input" placeholder="Co mamy dziś do osiągnięcia?">
                <button id="add-task-btn">Dodaj</button>
            </div>
        </section>

        <ul id="task-list"></ul>

        <div class="stats">
            <span id="task-count">0 zadań</span>
            <button id="clear-all" class="text-btn">Wyczyść ukończone</button>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
